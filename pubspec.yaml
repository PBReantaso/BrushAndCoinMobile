name: brush_and_coin_mobile
description: Simple foundation Flutter app for Brush&Coin capstone
publish_to: "none"

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.2
  flutter_secure_storage: ^9.2.2
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  geolocator: ^14.0.2
  permission_handler: ^12.0.1
  image_picker: ^1.2.1
  shared_preferences: ^2.3.3
  intl: ^0.19.0
  timezone: ^0.9.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

